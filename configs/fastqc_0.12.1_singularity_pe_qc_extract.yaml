info:
  user: jhkim
  date: 260529
  logs: |
    - Initial creation for Paired-End FastQC execution

tool:
  name: FastQC
  version: "0.12.1"
  profile: Paired-End QC and Extract
  description: |
    Quality control checks on raw sequence data coming from high throughput sequencing pipelines (Paired-End).
  setup: |
    # No specific setup required for Singularity execution.

io:
  inputs:
    SeqID:       { required: true, type: str, help: "Sequence identifier used to locate FASTQ files" }
    RawFastqDir: { required: true, type: str, help: "Directory containing raw or trimmed FASTQ files" }
    qcResDir:    { required: true, type: str, help: "Directory where FastQC reports will be saved" }

  outputs:
    # FastQC 기본 산출물 (PE Read 1/2)
    r1_html: { required: false, type: str, default: "[qcResDir]/[SeqID]_R1_fastqc.html", help: "Quality report for Read 1 in HTML" }
    r2_html: { required: false, type: str, default: "[qcResDir]/[SeqID]_R2_fastqc.html", help: "Quality report for Read 2 in HTML" }
    r1_zip:  { required: false, type: str, default: "[qcResDir]/[SeqID]_R1_fastqc.zip",  help: "Data zip file for Read 1" }
    r2_zip:  { required: false, type: str, default: "[qcResDir]/[SeqID]_R2_fastqc.zip",  help: "Data zip file for Read 2" }
    # --extract 옵션 사용 시 생성되는 폴더
    r1_dir:  { required: false, type: str, default: "[qcResDir]/[SeqID]_R1_fastqc", help: "Extracted report directory for Read 1" }
    r2_dir:  { required: false, type: str, default: "[qcResDir]/[SeqID]_R2_fastqc", help: "Extracted report directory for Read 2" }

params:
  # --- [File Suffix] ---
  InputSuffix: { required: false, type: str, default: ".fastq.gz", help: "FASTQ file extension (e.g., .fastq.gz, .fq.gz)" }

  # --- [Binaries & Container] ---
  singularity_bin: { required: false, type: str, default: "singularity", help: "Path to singularity executable" }
  fastqc_bin:      { required: false, type: str, default: "fastqc",      help: "FastQC binary name inside container" }
  sif:             { required: false, type: str, default: "/storage/images/fastqc-0.12.1.sif", help: "Path to FastQC SIF image" }
  bind:            { required: false, type: str, default: "/storage,/data", help: "Mount paths for singularity exec" }

  # --- [Resources & Options] ---
  Threads:     { required: false, type: int, default: 8, help: "Number of threads (FastQC processes files in parallel)" }
  fastqc_args: { required: false, type: str, default: "--extract", help: "Additional FastQC flags (e.g., --extract, --nogroup)" }

cmd_line: >
  [singularity_bin] exec -B [bind] [sif] [fastqc_bin] [fastqc_args]
  --threads [Threads] --outdir [qcResDir]
  [RawFastqDir]/[SeqID]_R1[InputSuffix] [RawFastqDir]/[SeqID]_R2[InputSuffix]
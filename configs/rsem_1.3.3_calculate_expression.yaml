tool:
  name: rsem
  version: "1.3.3"
  profile: "calculate_expression_quanti"
  description: |
    RSEM is a software package for estimating gene and isoform expression levels from RNA-Seq data. 
    This module uses transcriptome-aligned BAM files (e.g., from STAR) as input to calculate 
    abundance estimates with support for various strandedness and library types.

io:
  inputs:
    SeqID:
      required: true
      help: "Unique sample identifier used for naming the output files (e.g., .genes.results)."
    TranscriptomeBam:
      required: true
      help: "Path to the BAM file aligned to the transcriptome. Required: STAR's Aligned.toTranscriptome.out.bam."
    InputSuffix:
      reuired: false
      default: ".Aligned.toTranscriptome.out.bam"
      help: "Suffix for the input BAM file if not using the default STAR transcriptome BAM"
    RsemIndex:
      required: true
      help: "The prefix of the RSEM reference index (generated by rsem-prepare-reference)."
    OutputDir:
      required: true
      help: "Directory where the quantification results and diagnostic logs will be stored."

params:
  # [Rule 0] [MODIFIED] Set all defaults to null to enforce explicit parameter injection and error handling.
  Threads:
    { type: int, default: 12, help: "Number of threads to use for the calculation." }
  PairedFlag:
    { type: str, default: --paired-end, help: "Explicit flag for paired-end data. Must provide '--paired-end' for PE or '' for SE." }
  NoBamOutput:
    { type: bool, default: --no-bam-output, help: "If true, applies '--no-bam-output' to suppress BAM file generation (saves disk space)." }
  EstimateRspd:
    { type: bool, default: --estimate-rspd, help: "If true, applies '--estimate-rspd' to estimate the read start position distribution." }
  StrandOption:
    { type: str, default: none, help: "Strandedness configuration. Must provide one of: 'none', 'forward', or 'reverse'." }
  ExtraArgs:
    { type: str, default: null, help: "Additional RSEM parameters (e.g., '--estimate-rspd --no-bam-output'). Pass '' if not needed." }
  
  singularity_bin: 
    { type: str, default: singularity, help: "Absolute path to the singularity/apptainer executable." }
  rsem_sif:        
    { type: str, default: "/storage/images/rsem-1.3.3.sif", help: "Path to the RSEM singularity image file (.sif)." }
  bind:            
    { type: str, default: "/storage,/data", help: "Host paths to mount inside the container (e.g., '/storage,/data')." }
  
cmd_line: >
  [singularity_bin] exec -B [bind] [rsem_sif] rsem-calculate-expression
  [PairedFlag]
  [NoBamOutput]
  [EstimateRspd]
  [ExtraArgs]
  --num-threads [Threads]
  --strandedness [StrandOption]
  --alignments [TranscriptomeBam]/[SeqID][InputSuffix]
  [RsemIndex]
  [OutputDir]/[SeqID]
info:
  user: WRITER_NAME
  date: DATE
  logs: |
    - Initial creation for Kraken2 paired-end taxonomic classification
    - Added on-the-fly subsampling using bash process substitution <(zcat | head)

tool:
  name: Kraken2
  version: "2.x"
  profile: Taxonomic Classification with Subsampling
  description: |
    Kraken2를 이용하여 샘플 내 미생물/오염원 분류를 수행합니다.
    분석 속도를 높이기 위해 원본 FASTQ.GZ 파일의 앞부분(Subsample)만 추출하여 분석합니다.
  setup: |
    # No specific setup required

io:
  inputs:
    SeqID:        { required: true, type: str, help: "분석 고유 ID (Sample ID)" }
    TrimFastqDir: { required: true, type: str, help: "Trimmed FASTQ 파일이 위치한 디렉토리 경로" }
    KrakenDB:     { required: true, type: str, help: "Kraken2 데이터베이스 디렉토리 경로" }
    OutDir:       { required: true, type: str, help: "결과물이 저장될 디렉토리 경로" }

  outputs:
    sub_r1:     { required: false, type: str, default: "[OutDir]/[SeqID].trimmed_sub_R1.fastq.gz", help: "Subsampled Read 1" }
    sub_r2:     { required: false, type: str, default: "[OutDir]/[SeqID].trimmed_sub_R2.fastq.gz", help: "Subsampled Read 2" }
    kraken_out: { required: false, type: str, default: "[OutDir]/[SeqID].kraken", help: "Kraken2 분류 결과 파일" }
    report_out: { required: false, type: str, default: "[OutDir]/[SeqID].kreport", help: "Kraken2 계층적 요약 리포트" }
    plot_out:   { required: false, type: str, default: "[OutDir]/[SeqID]_krona.html", help: "생성된 Krona 대화형 HTML 플롯" }

params:
  # --- [Seqkit Subsampling Options] ---
  seqkit_bin: { required: false, type: str, default: "/storage/apps/seqkit-2.8.2/seqkit", help: "Seqkit 실행 절대 경로" }
  SampleSeed: { required: false, type: int, default: 100, help: "난수 시드 (PE 동기화를 위해 R1/R2 동일 적용)" }
  SampleNum:  { required: false, type: int, default: 100000, help: "추출할 Read 개수 (-n)" }
  
  # --- [File Extensions] ---
  R1_suffix: { required: false, type: str, default: ".trimmed_R1.fastq.gz", help: "Read 1 입력 파일의 Suffix" }
  R2_suffix: { required: false, type: str, default: ".trimmed_R2.fastq.gz", help: "Read 2 입력 파일의 Suffix" }

  # --- [Kraken & Krona Options] ---
  kraken2_bin: { required: false, type: str, default: "/storage/home/jhkim/Apps/kraken2/bin/kraken2", help: "Kraken2 명령어" }
  
  KrakenDB:    { required: false, type: str, default: "/storage/home/jhkim/Apps/kraken2/bin/kraken2_db", help: "Kraken2-db 명령어" }
  krona_bin:   { required: false, type: str, default: "/storage/home/jhkim/Apps/Krona/KronaTools/bin/ktImportTaxonomy", help: "Krona 명령어" }
  Threads:     { required: false, type: int, default: 8, help: "병렬 처리에 사용할 스레드 수" }

# && 연산자를 통해 4개의 명령어를 하나의 파이프라인 체인으로 묶습니다.
cmd_line: >
  [seqkit_bin] sample -s [SampleSeed] -n [SampleNum] [TrimFastqDir]/[SeqID][R1_suffix] | gzip > [sub_r1]
  &&
  [seqkit_bin] sample -s [SampleSeed] -n [SampleNum] [TrimFastqDir]/[SeqID][R2_suffix] | gzip > [sub_r2]
  &&
  [kraken2_bin] --db [KrakenDB] --threads [Threads] --report [report_out] --paired [sub_r1] [sub_r2] > [kraken_out]
  &&
  [krona_bin] -m 4 -t 3 [kraken_out] -o [plot_out]
info:
  user: WRITER_NAME
  date: DATE
  logs: |
    - Initial creation for Kraken2 paired-end taxonomic classification
    - Added on-the-fly subsampling using bash process substitution <(zcat | head)

tool:
  name: Kraken2
  version: "2.x"
  profile: Taxonomic Classification with Subsampling
  description: |
    Kraken2를 이용하여 샘플 내 미생물/오염원 분류를 수행합니다.
    분석 속도를 높이기 위해 원본 FASTQ.GZ 파일의 앞부분(Subsample)만 추출하여 분석합니다.
  setup: |
    # No specific setup required

io:
  inputs:
    SeqID:       { required: true, type: str, help: "분석 고유 ID (Sample ID)" }
    RawFastqDir: { required: true, type: str, help: "원본 FASTQ 파일이 위치한 디렉토리 경로" }
    KrakenDB:    { required: true, type: str, help: "Kraken2 데이터베이스 디렉토리 경로" }
    OutDir:      { required: true, type: str, help: "Kraken2 결과가 저장될 디렉토리 경로" }

  outputs:
    # 파이프라인 무결성 검사를 위해 핵심 출력 파일 명시
    report_out: { required: false, type: str, default: "[OutDir]/[SeqID].kreport", help: "Krona 등에서 사용할 Kraken2 계층적 리포트 파일" }
    kraken_out: { required: false, type: str, default: "[OutDir]/[SeqID].kraken", help: "리드별 분류 결과 파일 (용량이 크면 '-'로 생략 가능)" }

params:
  # --- [Subsampling Options] ---
  InputSuffix:    { required: false, type: str, default: ".fastq.gz", help: "입력 FASTQ 파일 확장자" }
  SubsampleLines: { required: false, type: int, default: 4000000, help: "추출할 라인 수 (FASTQ는 4줄이 1개의 Read이므로, 4000000 = 100만 Reads 추출)" }

  # --- [Kraken2 Execution Options] ---
  kraken2_bin: { required: false, type: str, default: "/storage/home/jhkim/Apps/kraken2/kraken2", help: "Kraken2 실행 명령어 또는 절대 경로" }
  Threads:     { required: false, type: int, default: 8, help: "병렬 처리에 사용할 스레드 수 (--threads)" }
  Confidence:  { required: false, type: float, default: 0.05, help: "분류 신뢰도 임계값 [0, 1] (--confidence)" }
  ExtraArgs:   { required: false, type: str, default: "--use-names", help: "추가 옵션 (예: --quick, --memory-mapping 등)" }

# [중요] <(zcat ...) 을 통해 압축이 풀린 텍스트 스트림으로 전달되므로 --gzip-compressed 옵션은 제외해야 합니다.
cmd_line: >
  [kraken2_bin]
  --db [KrakenDB]
  --threads [Threads]
  --confidence [Confidence]
  --report [report_out]
  --output [kraken_out]
  --paired
  [ExtraArgs]
  <(zcat [RawFastqDir]/[SeqID]_R1[InputSuffix] | head -n [SubsampleLines])
  <(zcat [RawFastqDir]/[SeqID]_R2[InputSuffix] | head -n [SubsampleLines])
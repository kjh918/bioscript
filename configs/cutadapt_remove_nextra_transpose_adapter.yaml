info:
  user: WRITER_NAME
  date: DATE
  logs: |
    - Initial creation for Paired-End Nextera adapter trimming using Cutadapt

tool:
  name: Cutadapt
  version: "4.4"
  profile: Nextera Adapter Trimming (PE)
  description: |
    Nextera Transposase 어댑터 오염을 제거하고, 지정된 Quality 이하의 3' 말단을 트리밍하며, 너무 짧아진 Read를 필터링하는 전처리 단계입니다.
  setup: |
    # (필요 시 conda 환경 활성화 등)
    # source /storage/apps/miniconda3/etc/profile.d/conda.sh
    # conda activate cutadapt_env

io:
  inputs:
    SeqID:       { required: true, type: str, help: "분석 고유 ID (Sample ID)" }
    RawFastqDir: { required: true, type: str, help: "원본 FASTQ 파일이 위치한 디렉토리 경로" }
    OutDir:      { required: true, type: str, help: "Trimmed FASTQ 파일이 저장될 디렉토리 경로" }

  outputs:
    # 파이프라인 무결성 검사(MD5)를 위해 outputs에 명시
    r1_clean: { required: false, type: str, default: "[OutDir]/[SeqID]_R1.trimmed.fastq.gz", help: "Trimmed Read 1 FASTQ" }
    r2_clean: { required: false, type: str, default: "[OutDir]/[SeqID]_R2.trimmed.fastq.gz", help: "Trimmed Read 2 FASTQ" }
    trim_log: { required: false, type: str, default: "[OutDir]/[SeqID]_cutadapt.log", help: "Cutadapt 처리 통계 로그 파일" }

params:
  # --- [File Extensions] ---
  InputSuffix: { required: false, type: str, default: ".fastq.gz", help: "입력 FASTQ 파일 확장자 (예: .fq.gz, .fastq.gz)" }

  # --- [Nextera Adapter Sequences] ---
  # Nextera DNA Prep 등에 사용되는 공통 Transposase 서열
  AdapterR1: { required: false, type: str, default: "CTGTCTCTTATACACATCT", help: "Read 1 3' 어댑터 서열 (-a)" }
  AdapterR2: { required: false, type: str, default: "CTGTCTCTTATACACATCT", help: "Read 2 3' 어댑터 서열 (-A)" }

  # --- [Trimming Options] ---
  QualityCutoff: { required: false, type: int, default: 20, help: "3' 말단 Quality Trimming 임계값 (-q)" }
  MinLength:     { required: false, type: int, default: 30, help: "Trimming 후 남길 최소 Read 길이 (-m)" }
  
  # --- [Resources & Execution] ---
  Threads:      { required: false, type: int, default: 4, help: "병렬 처리에 사용할 스레드 수 (-j)" }
  cutadapt_bin: { required: false, type: str, default: "/storage/home/jhkim/Apps/Python-3.11.13/python -m cutadapt", help: "Cutadapt 실행 명령어 또는 절대 경로" }

cmd_line: >
  [cutadapt_bin]
  -j [Threads]
  -a [AdapterR1]
  -A [AdapterR2]
  -q [QualityCutoff]
  -m [MinLength]
  -o [r1_clean]
  -p [r2_clean]
  [RawFastqDir]/[SeqID]_R1[InputSuffix]
  [RawFastqDir]/[SeqID]_R2[InputSuffix]
  > [trim_log]
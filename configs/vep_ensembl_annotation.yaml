# =========================================================
# Ensembl VEP (Ensembl Transcript Mode)
#  - Research-focused annotation with UniProt, CCDS, and Domains
#  - Supports Optional COSMIC & ClinVar for hg38/hg19
# =========================================================
tool:
  name: vep_ensembl
  version: "110"
  profile: "comprehensive_research_annotation"

io:
  inputs:
    SeqID:           { required: true }
    vcfDir:          { required: true }
    VcfTag:          { required: true, help: "Input VCF tag (e.g. mutect2.filtered)" }
    
    # [Resource Paths]
    vepCacheDir:     { required: true }
    genomeFasta:     { required: true }
    vepBam:          { required: true, help: "BAM file for transcript-matching" }
    
    # [Annotation Resources - Assembly specific]
    clinvarData:     { required: true }
    cosmicData:      { required: false }
    alphaMissense:   { required: true }
    caddSnp:         { required: true }
    caddIndel:       { required: true }

  outputs:
    vep_vcf:   { default: "[vcfDir]/[SeqID].[VcfTag].vep.ensembl.vcf" }
    vep_stats: { default: "[vcfDir]/[SeqID].[VcfTag].vep.ensembl.vcf_summary.txt" }

params:
  # --- [Basic Settings] ---
  assembly:        { type: str, default: "GRCh38", help: "GRCh38 or GRCh37" }
  species:         { type: str, default: "homo_sapiens" }
  Threads:         { type: int, default: 8 }
  buffer_size:     { type: int, default: 50000 }

  # --- [Optional Flags] ---
  # COSMIC/ClinVar 옵션 (파이썬에서 어셈블리에 따라 주입)
  cosmic_args:     { type: str, default: "" }
  clinvar_args:    { type: str, default: "--custom file=[clinvarData],short_name=ClinVar,format=vcf,fields=CLNSIG%CLNDN%ORIGIN" }
  
  # --- [Binaries] ---
  singularity_bin: { type: str, default: "singularity" }
  vep_sif:         { type: str, default: "/storage/images/vep-110.sif" }
  bind:            { type: str, default: "/storage,/data" }

cmd_line: >
  [singularity_bin] exec -B [bind] [vep_sif] vep
  --force_overwrite --offline --cache
  --dir_cache [vepCacheDir] --fasta [genomeFasta] --bam [vepBam]
  --species [species] --assembly [assembly]
  --input_file [vcfDir]/[SeqID].[VcfTag].vcf
  --output_file [vep_vcf]
  --vcf --stats_text --hgvs --hgvsg --canonical --exclude_predicted
  --ccds --uniprot --domains
  --fork [Threads] --buffer_size [buffer_size]
  [clinvar_args]
  [cosmic_args]
  --plugin AlphaMissense,file=[alphaMissense]
  --plugin CADD,snv=[caddSnp],indels=[caddIndel]
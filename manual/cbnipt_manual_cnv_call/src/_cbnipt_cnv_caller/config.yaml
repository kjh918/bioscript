CFG:
  # ── QC (bin-level) ──────────────────────────────────────────
  min_depth: 2
  min_coverage: 0.5

  # ── 태아 성별 판별 (CN scale, autosome baseline = 2.0) ───────
  # copy_number_signal 기준. x_female_min_cn 초과 & y_male_min_cn 미만 -> XX
  # y_male_min_cn 초과 & x_female_min_cn 미만 -> XY
  # (normalization.py / pipeline.py 의 하드코딩된 1.5 / 0.2 를 대체)
  x_female_min_cn: 1.5
  y_male_min_cn: 0.2

  # ── Chromosome-level scoring / calling (classification) ──────
  robust_z_threshold: 2.5
  pval_threshold: 0.05
  homo_rate_threshold: 0.6
  ter_z_thresh: 2.0

  mosaic_log2_min: 0.10
  mosaic_log2_max: 0.45
  mosaic_bin_shift_min: 0.55
  mosaic_score_thresh: 0.45

  # final_score = w_copy*copy_s + w_baf*baf_s*dir + w_ter*... (chrom_calling.py)
  w_copy: 0.4
  w_baf: 0.25
  w_ter: 0.15
  w_cer: 0.15
  w_pval: 0.10
  call_thresh_high: 0.70
  call_thresh_low: 0.5

  # ── 성염색체 이수성(Aneuploidy) 하드콜 규칙 ────────────────────
  # [통합됨] 기존에 두 곳(analyze_all_chromosomes의 raw_count 비율 기반 cutoff,
  # NIPT_DIAGNOSIS_RULES의 CN 기반 range)에 서로 다른 기준으로 중복 존재하던
  # Turner/Klinefelter/Jacob(XYY)/TripleX 판정을 CN scale(copy_number_signal,
  # 상염색체 baseline=2.0) 기준 단일 규칙으로 통합.
  # sex_calling.py의 classify_sex_chromosome() 이 이 표를 유일한 근거로 사용하며,
  # chrom_calling.py 와 clinical_diagnosis.py 양쪽에서 동일 함수를 호출한다.
  # row_chrom : call_df/marker_df 에서 어느 염색체 행에 이 판정을 표시할지
  #             (원본 코드의 if chrom=="chrX"/"chrY" 분기를 그대로 보존)
  SEX_ANEUPLOIDY:
    turner:
      applies_to: XX
      row_chrom: chrX
      x_min: 0.5
      x_max: 1.4
      y_max: 0.4
      pattern_name: "Turner(X0)"
      call: ABNORMAL
      score: -0.7
    triple_x:
      applies_to: XX
      row_chrom: chrX
      x_min: 2.5
      x_max: 3.5
      y_max: 0.4
      pattern_name: "TripleX(XXX)"
      call: ABNORMAL
      score: 0.7
    sry_contamination:
      applies_to: XX
      row_chrom: chrY
      y_min: 0.20
      pattern_name: "SRY Contamination"
      call: SUSPICIOUS
      score: 0.4
    klinefelter:
      applies_to: XY
      row_chrom: chrX
      x_min: 1.6
      x_max: 2.4
      y_min: 0.4
      y_max: 1.5
      pattern_name: "Klinefelter(XXY)"
      call: ABNORMAL
      score: 0.7
    jacob:
      applies_to: XY
      row_chrom: chrY
      x_min: 0.5
      x_max: 1.5
      y_min: 1.6
      y_max: 2.5
      pattern_name: "Jacob(XYY)"
      call: ABNORMAL
      score: 0.7
    x_loss_male:
      applies_to: XY
      row_chrom: chrX
      x_max: 0.5
      pattern_name: "chrX Loss"
      call: ABNORMAL
      score: -0.7
    y_loss_male:
      applies_to: XY
      row_chrom: chrY
      y_max: 0.5
      pattern_name: "chrY Loss"
      call: ABNORMAL
      score: -0.7

  # ── Segmentation ───────────────────────────────────────────
  SEGMENTATION:
    macro:                       # segment_one_cell (PELT, 1D changepoint)
      model: l1
      penalty: 8.0
      min_size: 4
      jump: 1
      min_bins: 4
      min_segment_bp: 400000
      gain_log2: 0.35
      loss_log2: -0.45
    micro:                       # rolling_micro_cnv_segmentation
      window: 3
      gain_threshold: 1.3
      # [버그 수정] 기존 pipeline.py 에서 -0.7 로 전달되어 조건이 항상 거짓이었음.
      # normalized_count(=copy_number_signal/2.0)는 항상 0 이상이므로 양수여야 함.
      loss_threshold: 0.7
      min_bins: 4
      min_segment_bp: 400000
      max_seg_mad: 0.20

  # ── Bin-level evidence extraction (BAM/VCF) ───────────────────
  BIN_EXTRACTION:
    min_baseq: 20
    hetero_min: 0.4
    hetero_max: 0.6
    homo_min: 0.9
    homo_max: 0.1

CALL_COLORS:
  "NORMAL": "#4CAF50"
  "SUSPICIOUS": "#FF9800"
  "ABNORMAL": "#F44336"
CFG:
  # ── QC (bin-level) ──────────────────────────────────────────
  min_depth: 2
  min_coverage: 0.3

  # ── 태아 성별 판별 (CN scale, autosome baseline = 2.0) ───────
  # copy_number_signal 기준. x_female_min_cn 초과 & y_male_min_cn 미만 -> XX
  # y_male_min_cn 초과 & x_female_min_cn 미만 -> XY
  # (normalization.py / pipeline.py 의 하드코딩된 1.5 / 0.2 를 대체)
  x_female_min_cn: 1.5
  y_male_min_cn: 0.2 ## NIPT : 2% ~ 4% 

  # ── Chromosome-level scoring / calling (classification) ──────
  robust_z_threshold: 2.5
  pval_threshold: 0.05
  homo_rate_threshold: 0.6
  ter_z_thresh: 2.0

  mosaic_log2_min: 0.10
  mosaic_log2_max: 0.45
  mosaic_bin_shift_min: 0.55
  mosaic_score_thresh: 0.45

  # final_score = w_copy*copy_s + w_baf*baf_s*dir + w_ter*... (chrom_calling.py)
  w_copy: 0.4
  w_baf: 0.25
  w_ter: 0.15
  w_cer: 0.15
  w_pval: 0.10
  call_thresh_high: 0.70
  call_thresh_low: 0.5

  # ── 성염색체 이수성(Aneuploidy) 하드콜 규칙 ────────────────────
  # [통합됨] 기존에 두 곳(analyze_all_chromosomes의 raw_count 비율 기반 cutoff,
  # NIPT_DIAGNOSIS_RULES의 CN 기반 range)에 서로 다른 기준으로 중복 존재하던
  # Turner/Klinefelter/Jacob(XYY)/TripleX 판정을 CN scale(copy_number_signal,
  # 상염색체 baseline=2.0) 기준 단일 규칙으로 통합.
  # sex_calling.py의 classify_sex_chromosome() 이 이 표를 유일한 근거로 사용하며,
  # chrom_calling.py 와 clinical_diagnosis.py 양쪽에서 동일 함수를 호출한다.
  # row_chrom : call_df/marker_df 에서 어느 염색체 행에 이 판정을 표시할지
  #             (원본 코드의 if chrom=="chrX"/"chrY" 분기를 그대로 보존)
  SEX_ANEUPLOIDY:
    turner:
      applies_to: XX
      row_chrom: chrX
      x_min: 0.5
      x_max: 1.4
      y_max: 0.4
      pattern_name: "Turner(X0)"
      call: ABNORMAL
      score: -0.7
    triple_x:
      applies_to: XX
      row_chrom: chrX
      x_min: 2.5
      x_max: 3.5
      y_max: 0.4
      pattern_name: "TripleX(XXX)"
      call: ABNORMAL
      score: 0.7
    sry_contamination:
      applies_to: XX
      row_chrom: chrY
      y_min: 0.20
      y_max: 0.40   # [추가] trace 수준으로 상한을 둬서 klinefelter/jacob의 실제 Y 존재 구간(y_min>=0.4)과 겹치지 않게 함
      pattern_name: "SRY Contamination"
      call: SUSPICIOUS
      score: 0.4
    klinefelter:
      applies_to: XY
      row_chrom: chrX
      x_min: 1.6
      x_max: 2.4
      y_min: 0.4
      y_max: 1.5
      pattern_name: "Klinefelter(XXY)"
      call: ABNORMAL
      score: 0.7
    jacob:
      applies_to: XY
      row_chrom: chrY
      x_min: 0.5
      x_max: 1.5
      y_min: 1.6
      y_max: 2.5
      pattern_name: "Jacob(XYY)"
      call: ABNORMAL
      score: 0.7
    # [제거됨] x_loss_male / y_loss_male
    # 이 둘은 "XY인데 X 또는 Y를 잃음" 이라는 의미였지만, 실제 카리오타입 관점에서는
    # X 단일(X0), Y 없음 이라는 점에서 turner 와 완전히 동일합니다. 성별 태그로
    # 게이팅하지 않게 되면서(위 classify_sex_chromosome 참고) X/Y 값만으로는
    # turner 와 절대 구분할 수 없고, 특히 y_loss_male(y_max=0.4, x 조건 없음)은
    # 정상 여성(X=2.0, Y=0.0)까지 "chrY Loss"로 오탐하는 문제가 있어 제거했습니다.
    # X0 카리오타입은 turner 규칙(chrX 행)이 담당합니다.

  # ── Segmentation ───────────────────────────────────────────
  SEGMENTATION:
    macro:                       # segment_one_cell (PELT, 1D changepoint)
      model: l1
      penalty: 8.0
      min_size: 4
      jump: 1
      min_bins: 4
      min_segment_bp: 400000
      gain_log2: 0.35
      loss_log2: -0.45
    micro:                       # rolling_micro_cnv_segmentation
      window: 3
      gain_threshold: 1.3
      loss_threshold: 0.7
      min_bins: 4
      min_segment_bp: 400000
      max_seg_mad: 0.0

  CHROM_BIAS_CORRECTION:
    chr19: 0.2
  min_reliable_overlap_bins: 3

  # ── Bin-level evidence extraction (BAM/VCF) ───────────────────
  BIN_EXTRACTION:
    min_baseq: 20
    hetero_min: 0.4
    hetero_max: 0.6
    homo_min: 0.9
    homo_max: 0.1

  # ── 임상 진단(Marker DB) Rule Dictionary ────────────────────────
  # [통합/분리됨] 과거 classification.py 의 NIPT_DIAGNOSIS_RULES 는
  # "autosome abnormality" / "micro deletion" 딱 2개의 NIPT_GROUP 공통 threshold를
  # 모든 syndrome이 함께 썼습니다 (예: Down/Edwards/Patau/Trisomy9/Trisomy22 이
  # 전부 pos_min=2.5 하나를 공유). 이 때문에 mosaicism 계열처럼 실제 CN이
  # 2.5에 한참 못 미치는 syndrome도 특정 조건에서 잘못 POSITIVE 처리될 수 있었습니다.
  # 여기서는 syndrome 이름(marker_df의 SYNDROME 컬럼, 소문자) 단위로 threshold를
  # 분리해서 개별 튜닝이 가능하도록 했습니다.
  # [주의] 아래 수치는 전부 기존 공통값(AMP: pos_min=2.5/sus_min=2.3,
  # DEL: pos_max=1.5/sus_max=1.65)을 그대로 복사만 한 상태입니다.
  # syndrome별 실제 임상 근거에 맞게 개별적으로 다시 튜닝이 필요합니다.
  CLINICAL_DIAGNOSIS_RULES:
    # --- AMP-type (Autosome Abnormality) ---
    "down syndrome":                        {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}
    "edwards syndrome":                     {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}
    "patau syndrome":                       {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}
    "trisomy 22 mosaicism syndrome":        {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}
    "trisomy 9 mosaicism syndrome":         {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}

    # --- DEL-type (Micro Deletion) ---
    "1p36 deletion syndrome":               {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "angelman syndrome":                    {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "cri-du-chat syndrome":                 {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "digeorgy syndrome":                    {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "jacobsen syndrome":                    {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "miller-dieker lissencephaly syndorome": {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "prader-willi syndrome":                {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "smith-magenis syndrome":               {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}
    "wolf-hirschhorn syndrome":             {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}

    # --- Fallback (위에 명시되지 않은 새로운 syndrome이 marker DB에 추가될 경우) ---
    "_default_amp": {rule_type: AMP, pos_min: 2.5, sus_min: 2.3}
    "_default_del": {rule_type: DEL, pos_max: 1.5, sus_max: 1.65,} # loh_homo_min: 0.85, loh_hetero_max: 0.1}

CALL_COLORS:
  "NORMAL": "#4CAF50"
  "SUSPICIOUS": "#FF9800"
  "ABNORMAL": "#F44336"
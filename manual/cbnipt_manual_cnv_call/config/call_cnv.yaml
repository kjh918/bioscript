    - Initial creation for Single Sample CNV Calling and variants profiling (Sample Task)

tool:
  name: cbNIPT_CallCNV
  version: "1.0.0"
  profile: Calculate CNV and variant profile
  setup: |
    # (필요 시 conda 환경 활성화 등)

io:
  inputs:
    SeqID: { required: true, type: str, help: "분석 고유 ID" }
    BamPath: { required: true, type: str, help: "분석할 단일 BAM 파일 경로" }
    AnnotatedBins: { required: true, type: str, help: "make-bins로 생성한 사전 계산 빈 파일(.bed.gz)" }
  outputs:
    OutDir: { required: true, type: str, help: "결과 저장 디렉토리" }

params:
  MinMapQ: { required: false, type: int, default: 20, help: "최소 Mapping Quality" }
  LowessFrac: { required: false, type: float, default: 0.2, help: "GC 보정 LOWESS 비율" }
  BaselinePloidy: { required: false, type: int, default: 2, help: "기준 Ploidy" }
  SmoothWindow: { required: false, type: int, default: 5, help: "Rolling median window size" }
  MinDepth: { required: false, type: float, default: 2.0, help: "최소 Depth" }
  MinCoverage: { required: false, type: float, default: 0.5, help: "최소 Coverage 비율" }
  MaskLowerQ: { required: false, type: float, default: 0.01, help: "하위 Coverage 필터" }
  MaskUpperQ: { required: false, type: float, default: 0.99, help: "상위 Coverage 필터" }
  SegPenalty: { required: false, type: float, default: 10.0, help: "Segmentation 민감도" }
  Threads: { required: false, type: int, default: 4, help: "사용할 스레드 수" }
  
  # 실행기 설정
  python_bin: { required: false, type: str, default: "python", help: "Python executable" }
  script_path: { required: true, type: str, help: "Path to the CNV analyzer script" }

cmd_line: >
  [python_bin] [script_path] call-cnv
  --SeqID [SeqID]
  --BamPath [BamPath]
  --AnnotatedBins [AnnotatedBins]
  --OutDir [OutDir]
  --MinMapQ [MinMapQ]
  --LowessFrac [LowessFrac]
  --BaselinePloidy [BaselinePloidy]
  --SmoothWindow [SmoothWindow]
  --MinDepth [MinDepth]
  --MinCoverage [MinCoverage]
  --MaskLowerQ [MaskLowerQ]
  --MaskUpperQ [MaskUpperQ]
  --SegPenalty [SegPenalty]
  --Threads [Threads]